services:
  server:
    container_name: autogeny-platform
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 4g
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL must be set}"
      PORT: "${PORT:-3100}"
      HOST: "${HOST:-0.0.0.0}"
      SERVE_UI: "${SERVE_UI:-true}"
      PAPERCLIP_DEPLOYMENT_MODE: "${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "${PAPERCLIP_DEPLOYMENT_EXPOSURE:-private}"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL}"
      PAPERCLIP_ALLOWED_HOSTNAMES: "${PAPERCLIP_ALLOWED_HOSTNAMES}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      AUTOGENY_JWT_SECRET: "${AUTOGENY_JWT_SECRET:?AUTOGENY_JWT_SECRET must be set}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:?OPENROUTER_API_KEY must be set}"
      PAPERCLIP_MIGRATION_AUTO_APPLY: "${PAPERCLIP_MIGRATION_AUTO_APPLY:-true}"
      HERMES_WORKSPACE: /paperclip/hermes
      OPENCLAW_GATEWAY_URL: "${OPENCLAW_GATEWAY_URL:-ws://host.docker.internal:4200}"
      PAPERCLIP_AGENT_JWT_SECRET: "${PAPERCLIP_AGENT_JWT_SECRET:-}"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:-}"
    volumes:
      - paperclip-data:/paperclip
      - agent-workspaces:/workspaces
    networks:
      - platform
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: autogeny-platform-db
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - platform

networks:
  platform:
    driver: bridge

volumes:
  paperclip-data:
  agent-workspaces:
  pgdata:

